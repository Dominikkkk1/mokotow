<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mokotów – podgląd inwestycji</title>
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #0a0a0a;
      font-family: Arial, sans-serif;
      color: #f5f5f5;
    }

    #app {
      display: flex;
      height: 100vh;
      overflow: hidden;
    }

    /* ── Main view (video / stream) ── */
    #main-view {
      position: relative;
      flex: 1;
      min-width: 0;
    }

    #video-layer,
    #stream-layer {
      position: absolute;
      inset: 0;
    }

    #video-layer {
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0a0a0a;
      transition: opacity 0.6s ease;
    }

    #video-layer.fade-out {
      opacity: 0;
      pointer-events: none;
      visibility: hidden;
    }

    .player-wrapper {
      width: 100%;
      height: 100%;
    }

    .plyr, .plyr__video-wrapper {
      height: 100%;
    }

    .plyr video {
      object-fit: cover;
      width: 100%;
      height: 100%;
    }

    #stream-layer {
      z-index: 1;
    }

    #stream-layer iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    /* ── Overlay controls on video ── */
    #overlay-controls {
      position: absolute;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      pointer-events: none;
    }

    #connect-btn {
      padding: 1rem 3rem;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 8px;
      font-size: 1.1rem;
      font-family: Arial, sans-serif;
      font-weight: 600;
      letter-spacing: 0.05em;
      cursor: pointer;
      pointer-events: auto;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    #connect-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 4px 20px rgba(255, 255, 255, 0.25);
    }

    #connect-btn.loading {
      background: rgba(0, 0, 0, 0.6);
      color: rgba(255, 255, 255, 0.9);
      border: 1px solid rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(6px);
      cursor: default;
      pointer-events: none;
      transform: none;
      box-shadow: none;
    }

    #connect-btn.ready {
      background: #fff;
      color: #000;
      cursor: pointer;
      pointer-events: auto;
      border: none;
    }

    #connect-btn.hidden {
      display: none;
    }

    #queue-text {
      display: none;
      padding: 0.6rem 1.5rem;
      background: rgba(0, 0, 0, 0.6);
      color: rgba(255, 255, 255, 0.9);
      border-radius: 6px;
      font-size: 0.95rem;
      backdrop-filter: blur(6px);
      pointer-events: none;
    }

    /* ── Sidebar ── */
    #sidebar {
      width: 240px;
      flex-shrink: 0;
      background: #111;
      border-left: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    #sidebar-header {
      padding: 1.25rem 1.25rem 1rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
    }

    #sidebar-header h2 {
      font-size: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: rgba(255, 255, 255, 0.7);
      font-weight: 600;
    }

    #apartments-list {
      flex: 1;
      overflow-y: auto;
      padding: 0.5rem 0;
    }

    .apt-card {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      transition: background 0.15s ease;
    }

    .apt-card:hover {
      background: rgba(255, 255, 255, 0.04);
    }

    .apt-card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.5rem;
    }

    .apt-name {
      font-size: 1rem;
      font-weight: 600;
    }

    .availability-badge {
      display: inline-block;
      padding: 0.2rem 0.55rem;
      border-radius: 999px;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }

    .availability-badge.available {
      background: rgba(46, 204, 113, 0.15);
      color: #2ecc71;
    }

    .availability-badge.unavailable {
      background: rgba(231, 76, 60, 0.15);
      color: #e74c3c;
    }

    .apt-details {
      display: flex;
      gap: 1rem;
      font-size: 0.78rem;
      color: rgba(255, 255, 255, 0.5);
      margin-bottom: 0.75rem;
    }

    .apt-price {
      font-size: 0.9rem;
      font-weight: 600;
      color: rgba(255, 255, 255, 0.85);
      margin-bottom: 0.75rem;
    }

    .apartment-select-btn {
      width: 100%;
      padding: 0.5rem;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 6px;
      color: #f5f5f5;
      font-size: 0.82rem;
      font-family: Arial, sans-serif;
      cursor: pointer;
      transition: background 0.15s ease, border-color 0.15s ease;
    }

    .apartment-select-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.4);
    }

    .apt-card.active .apartment-select-btn {
      background: rgba(255, 255, 255, 0.15);
      border-color: #fff;
    }

    #sidebar-footer {
      padding: 1rem 1.25rem;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      font-size: 0.72rem;
      color: rgba(255, 255, 255, 0.3);
      line-height: 1.4;
    }

    /* ── Mobile ── */
    @media (max-width: 768px) {
      #app {
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      #main-view {
        height: 45vh;
        flex: none;
        transition: height 0.4s ease;
      }

      #main-view.stream-active {
        height: 65vh;
      }

      #sidebar {
        width: 100%;
        flex: 1;
        min-height: 0;
        border-left: none;
        border-top: 1px solid rgba(255, 255, 255, 0.08);
        overflow-y: auto;
      }

      #sidebar-header {
        padding: 0.75rem 1rem;
      }

      #sidebar-header h2 {
        font-size: 0.85rem;
      }

      .apt-card {
        padding: 0.75rem 1rem;
      }

      .apt-name {
        font-size: 0.88rem;
      }

      .apt-details {
        font-size: 0.72rem;
        margin-bottom: 0.4rem;
      }

      .apt-price {
        font-size: 0.82rem;
        margin-bottom: 0.5rem;
      }

      .apartment-select-btn {
        padding: 0.4rem;
        font-size: 0.78rem;
      }

      #connect-btn {
        padding: 0.75rem 2rem;
        font-size: 0.95rem;
      }
    }
  </style>
</head>
<body>

  <div id="app">
    <div id="main-view">
      <div id="video-layer">
        <div class="player-wrapper">
          <video id="player" playsinline autoplay muted loop preload="auto">
            <source id="videoSource" type="video/mp4" />
          </video>
        </div>
      </div>

      <div id="stream-layer">
        <iframe
          id="streamIframe"
          allow="autoplay; camera"
          allowfullscreen
        ></iframe>
      </div>

      <div id="overlay-controls">
        <button id="connect-btn">Uruchom demo</button>
        <span id="queue-text">Kolejka: miejsce <span id="queue-position"></span></span>
      </div>
    </div>

    <div id="sidebar">
      <div id="sidebar-header">
        <h2>Apartamenty</h2>
      </div>
      <div id="apartments-list"></div>
    </div>
  </div>

  <script>
    const CONFIG = {
      videoSrc: 'https://ue-woodshack.s3.eu-west-1.amazonaws.com/Mokotow_Outsite_Lit_opt_1080.mp4',
      streamUrl: 'https://share.streampixel.io/69d02e1541d102927cd76c17',
    };
  </script>
  <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
  <script>
    function isTouchDevice() {
      return ('ontouchstart' in window) ||
        navigator.maxTouchPoints > 0 ||
        window.matchMedia('(pointer: coarse)').matches;
    }

    // ── Video setup ──
    const videoEl = document.getElementById('player');
    document.getElementById('videoSource').src = CONFIG.videoSrc;
    videoEl.load();

    const player = new Plyr('#player', {
      controls: [],
      ratio: '16:9',
      loop: { active: true },
      muted: true,
      clickToPlay: false,
    });

    player.on('ready', () => {
      player.muted = true;
      player.play();
    });

    videoEl.addEventListener('canplay', () => {
      videoEl.play().catch(() => {});
    });

    // ── DOM refs ──
    const connectBtn    = document.getElementById('connect-btn');
    const queueText     = document.getElementById('queue-text');
    const queuePosition = document.getElementById('queue-position');
    const videoLayer    = document.getElementById('video-layer');
    const streamLayer   = document.getElementById('stream-layer');
    const streamIframe  = document.getElementById('streamIframe');

    // ── State ──
    const STATE_PROGRESS = {
      authenticating:  10,
      connecting:      20,
      finalising:      80,
      loadingComplete: 100,
    };

    let displayedProgress = 0;
    let targetProgress    = 0;
    let streamComplete    = false;
    let readyTriggered    = false;
    let inQueue           = false;
    let demoStarted       = false;
    let streamLoading     = false;
    let pendingApartment  = null;

    // ── Progress animation ──
    function animateTick() {
      if (!streamLoading) { requestAnimationFrame(animateTick); return; }

      const diff = targetProgress - displayedProgress;
      if (Math.abs(diff) > 0.1) {
        displayedProgress += diff * 0.08;
        connectBtn.textContent = 'Ładowanie ' + Math.round(displayedProgress) + '%';
      }
      if (streamComplete && Math.round(displayedProgress) >= 100 && !readyTriggered) {
        readyTriggered = true;
        onStreamReady();
      }
      requestAnimationFrame(animateTick);
    }
    requestAnimationFrame(animateTick);

    let progressInterval = null;

    function startStreamLoading() {
      if (streamLoading) return;
      streamLoading = true;
      streamIframe.src = CONFIG.streamUrl;

      connectBtn.classList.add('loading');
      connectBtn.classList.remove('ready');
      connectBtn.textContent = 'Ładowanie 0%';

      progressInterval = setInterval(() => {
        if (!streamComplete && !inQueue) {
          targetProgress = Math.min(90, targetProgress + 0.4);
        }
      }, 400);
    }

    // ── Stream events ──
    function onStreamStateChange(state) {
      if (state.startsWith('queue-')) {
        onQueueUpdate(state.split('-')[1]);
        return;
      }

      if (queueText.style.display !== 'none') {
        queueText.style.display = 'none';
        connectBtn.style.display = '';
      }

      const progress = STATE_PROGRESS[state];
      if (progress !== undefined) {
        targetProgress = Math.max(targetProgress, progress);
      }
      if (state === 'loadingComplete') {
        streamComplete = true;
        targetProgress = 100;
        if (progressInterval) clearInterval(progressInterval);
      }
    }

    function onQueueUpdate(position) {
      if (position === '0') {
        inQueue = false;
        displayedProgress = 20;
        targetProgress    = 20;
        queueText.style.display = 'none';
        connectBtn.style.display = '';
        return;
      }
      inQueue = true;
      connectBtn.style.display = 'none';
      queueText.style.display = '';
      queuePosition.textContent = position;
    }

    function onStreamReady() {
      if (demoStarted) {
        switchToStream();
      } else {
        connectBtn.classList.remove('loading');
        connectBtn.classList.add('ready');
        connectBtn.textContent = 'DEMO \u25B6';
      }
    }

    function switchToStream() {
      connectBtn.classList.add('hidden');
      queueText.style.display = 'none';
      videoLayer.classList.add('fade-out');
      streamLayer.style.zIndex = 3;
      document.getElementById('main-view').classList.add('stream-active');
      streamIframe.focus();
      if (isTouchDevice()) {
        sendStreamPixelMessage({ type: 'ui', mode: 'touch'});
      } else {
        sendStreamPixelMessage({ type: 'ui', mode: 'mouse'});
      }
      if (pendingApartment) {
        selectApartment(pendingApartment);
        pendingApartment = null;
      }

      // Re-focus iframe when clicking the stream area
      streamLayer.addEventListener('click', () => streamIframe.focus());
      // Forward WASD/arrow keys to iframe when it loses focus
      document.addEventListener('keydown', (e) => {
        if (['w','a','s','d','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) {
          streamIframe.focus();
        }
      });
    }

    // ── Button click ──
    connectBtn.addEventListener('click', () => {
      if (!streamLoading) {
        startStreamLoading();
        demoStarted = true;
      } else if (readyTriggered) {
        demoStarted = true;
        switchToStream();
      }
    });

    // ── PostMessage listener ──
    window.addEventListener('message', (event) => {
      if (event.origin !== 'https://share.streampixel.io') return;
      if (event.data?.type === 'stream-state') {
        onStreamStateChange(event.data.value);
      }
    });

    // ── Apartments data ──
    const APARTMENTS_DATA = [
      { "id": "apartment13", "numer": "13", "kierunek": "NE", "powierzchnia": 63.0, "pokoje": 4, "cena": 830000, "dostepnosc": true },
      { "id": "apartment14", "numer": "14", "kierunek": "NW", "powierzchnia": 73.0, "pokoje": 5, "cena": 930000, "dostepnosc": false },
    ];

    const apartmentsList = document.getElementById('apartments-list');
    const priceFormatter = new Intl.NumberFormat('pl-PL');

    function renderApartments(apartments) {
      if (!apartments.length) {
        apartmentsList.innerHTML = '<div style="padding:1.25rem;color:rgba(255,255,255,0.4);font-style:italic">Brak apartamentów.</div>';
        return;
      }

      apartmentsList.innerHTML = apartments.map((apt) => `
        <div class="apt-card" data-id="${apt.id}">
          <div class="apt-card-top">
            <span class="apt-name">Apartament ${apt.numer}</span>
            <span class="availability-badge ${apt.dostepnosc ? 'available' : 'unavailable'}">
              ${apt.dostepnosc ? 'Dostępny' : 'Niedostępny'}
            </span>
          </div>
          <div class="apt-details">
            <span>${apt.powierzchnia} m²</span>
            <span>${apt.pokoje} ${apt.pokoje === 1 ? 'pokój' : apt.pokoje < 5 ? 'pokoje' : 'pokoi'}</span>
            <span>${apt.kierunek}</span>
          </div>
          <div class="apt-price">${priceFormatter.format(apt.cena)} zł</div>
          <button type="button" class="apartment-select-btn" data-apartment-id="${apt.id}">Wybierz</button>
        </div>
      `).join('');
    }

    function sendStreamPixelMessage(message, targetOrigin = 'https://share.streampixel.io') {
      console.log('[StreamPixel] postMessage ->', message, '(targetOrigin:', targetOrigin + ')');
      streamIframe.contentWindow.postMessage(message, targetOrigin);
    }

    function selectApartment(apartmentRowName) {
      document.querySelectorAll('.apt-card').forEach(c => c.classList.remove('active'));
      const card = document.querySelector(`.apt-card[data-id="${apartmentRowName}"]`);
      if (card) card.classList.add('active');
      sendStreamPixelMessage({ type: 'apartment-selection', apartmentRowName });
    }

    apartmentsList.addEventListener('click', (event) => {
      const button = event.target.closest('[data-apartment-id]');
      if (!button) return;
      const aptId = button.dataset.apartmentId;

      if (demoStarted && readyTriggered) {
        selectApartment(aptId);
      } else {
        pendingApartment = aptId;
        demoStarted = true;
        if (!streamLoading) {
          startStreamLoading();
        }
        if (readyTriggered) {
          switchToStream();
        }
      }
    });

    renderApartments(APARTMENTS_DATA);
  </script>
</body>
</html>
